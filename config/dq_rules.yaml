# Data Quality Rules for Silver Layer
dq_rules:
  accounts:
    - rule: "account_id NOT NULL"
      severity: "ERROR"
    - rule: "customer_id NOT NULL" 
      severity: "WARNING"
    - rule: "current_balance >= 0"
      severity: "ERROR"
  
  transactions:
    - rule: "transaction_id NOT NULL"
      severity: "ERROR"
    - rule: "account_id NOT NULL"
      severity: "ERROR"
    - rule: "amount > 0"
      severity: "ERROR"
    - rule: "transaction_date IS NOT NULL"
      severity: "WARNING"
  
  customers:
    - rule: "customer_id NOT NULL"
      severity: "ERROR"
    - rule: "email IS NOT NULL"
      severity: "WARNING"
